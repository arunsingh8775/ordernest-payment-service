server:
  port: 8083

spring:
  profiles:
    default: local
  config:
    import: optional:file:/etc/secrets/application-prod.yml
  application:
    name: ordernest-payment-service
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      timeout: 5s
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring:
          json:
            add:
              type:
                headers: false
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    properties:
      security:
        protocol: SSL

app:
  kafka:
    topic:
      payment-events: payment.events
      order-status-events: order.status.events
    consumer:
      order-status-group-id: ordernest-payment-service-order-status-consumer
  payment:
    pending-attempt-ttl-seconds: 3600
  razorpay:
    base-url: https://api.razorpay.com

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
