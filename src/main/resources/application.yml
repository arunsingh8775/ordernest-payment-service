server:
  port: 8083

spring:
  config:
    import: optional:file:./etc/secrets/config.properties,optional:file:/etc/secrets/config.properties
  application:
    name: ordernest-payment-service
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      password: ""
      timeout: 5s
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring:
          json:
            add:
              type:
                headers: false
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    properties:
      security:
        protocol: PLAINTEXT

app:
  order:
    base-url: http://localhost:8082
  kafka:
    topic:
      payment-events: payment.events
      order-cancelled-events: order.cancelled.events
    consumer:
      order-cancelled-group-id: ordernest-payment-service-order-cancel-consumer
  payment:
    pending-attempt-ttl-seconds: 3600
  razorpay:
    base-url: https://api.razorpay.com
    key-id: ""
    key-secret: ""
    webhook-secret: ""
